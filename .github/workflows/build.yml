name: Build & Release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (macOS)
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: World-Map-macOS
          path: dist/*.dmg
          retention-days: 90

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (Windows)
        run: npx electron-builder --win --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: World-Map-Windows
          path: dist/*.exe
          retention-days: 90

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          body: |
            ## 🌍 World Map ${{ github.event.release.tag_name }}

            ### Download Installers
            - **macOS**: Download `World Map-*.dmg` and run
            - **Windows**: Download `World Map-*.exe` and run

            ### What's New
            See [CHANGELOG](./CHANGELOG.md) for details.

            ### Installation
            1. Download the installer for your platform
            2. Run the installer
            3. Follow the on-screen instructions
            4. Launch "World Map" from your Applications (macOS) or Start Menu (Windows)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
